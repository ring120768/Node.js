
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Car Crash Lawyer AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #667eea;
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="email"]:focus, input[type="tel"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            margin-bottom: 15px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #666;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        .sign-in-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .sign-in-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚗</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join Car Crash Lawyer AI to get started</p>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>

        <form id="signUpForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input 
                    type="text" 
                    id="fullName" 
                    name="fullName" 
                    placeholder="Enter your full name"
                    required
                    autocomplete="name"
                >
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email address"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="Enter your phone number"
                    required
                    autocomplete="tel"
                >
            </div>

            <button type="submit" class="btn" id="signUpBtn">
                Create Account
            </button>

            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                <span>Creating your account...</span>
            </div>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <button class="btn btn-secondary" id="typeformSignUpBtn">
            Sign Up with Typeform
        </button>

        <div class="divider">
            <span>Already have an account?</span>
        </div>

        <a href="sign-in.html" class="sign-in-link">Sign in here</a>
    </div>

    <script>
        // Get UUID service from index.html if available
        const UUIDService = window.parent?.UUIDService || {
            generate: () => {
                return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
                );
            },
            getOrCreateSession: () => ({
                user_id: ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
                ),
                session_id: ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
                )
            }),
            buildTypeformUrl: (baseUrl, options = {}) => {
                const session = UUIDService.getOrCreateSession();
                const url = new URL(baseUrl);
                url.searchParams.set('user_id', session.user_id);
                url.searchParams.set('session_id', session.session_id);
                Object.entries(options).forEach(([key, value]) => {
                    if (value) url.searchParams.set(key, value);
                });
                return url.toString();
            }
        };

        document.getElementById('signUpForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const signUpBtn = document.getElementById('signUpBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            if (!fullName || !email || !phone) {
                showError('Please fill in all required fields');
                return;
            }

            // Disable form and show loading
            signUpBtn.disabled = true;
            loadingIndicator.style.display = 'block';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            console.log('🔍 Attempting sign-up with:', { fullName, email, phone });

            try {
                // Create user account
                const response = await fetch('/api/create-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fullName: fullName,
                        email: email,
                        phone: phone,
                        source: 'direct_signup'
                    })
                });

                const result = await response.json();
                console.log('📋 Sign-up result:', result);

                if (result.success) {
                    console.log('✅ Sign-up successful!');
                    
                    // Store user data in sessionStorage
                    const userId = result.userId || result.user?.uid;
                    sessionStorage.setItem('userId', userId);
                    sessionStorage.setItem('create_user_id', userId);
                    sessionStorage.setItem('username', result.user?.username || email);
                    sessionStorage.setItem('userEmail', email);
                    sessionStorage.setItem('userFullName', fullName);
                    sessionStorage.setItem('userPhone', phone);
                    sessionStorage.setItem('signUpTime', new Date().toISOString());

                    // Show success message
                    showSuccess('Account created successfully! Redirecting to incident report...');
                    
                    // Check if there's a redirect URL or go to incident form
                    const redirectUrl = sessionStorage.getItem('redirectAfterSignUp') || '/incident.html';
                    sessionStorage.removeItem('redirectAfterSignUp');
                    
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                    
                } else {
                    console.error('❌ Sign-up failed:', result);
                    let errorMsg = result.error || 'Sign-up failed. Please try again.';
                    
                    if (result.message) {
                        errorMsg = result.message;
                    }
                    
                    showError(errorMsg);
                }

            } catch (error) {
                console.error('❌ Sign-up error:', error);
                showError('Connection error. Please try again.');
            } finally {
                // Re-enable form
                signUpBtn.disabled = false;
                loadingIndicator.style.display = 'none';
            }
        });

        // Typeform signup button
        document.getElementById('typeformSignUpBtn').addEventListener('click', async () => {
            const button = document.getElementById('typeformSignUpBtn');
            const originalText = button.textContent;
            
            try {
                button.textContent = 'Opening Typeform...';
                button.disabled = true;
                
                // Get or create session for user ID
                const session = UUIDService.getOrCreateSession();
                
                // Use backend redirect service for consistent UUID handling
                const response = await fetch(`/api/redirect-to-typeform/signup?userId=${encodeURIComponent(session.user_id)}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.success && data.typeform_url) {
                        // Store user ID for return flow
                        sessionStorage.setItem('create_user_id', session.user_id);
                        sessionStorage.setItem('typeform_redirect_type', 'signup');
                        
                        console.log('🔗 Opening Typeform signup with UUID tracking');
                        window.open(data.typeform_url, '_blank');
                        
                        showSuccess('Typeform opened with UUID tracking');
                    } else {
                        throw new Error('Invalid response from redirect service');
                    }
                } else {
                    throw new Error('Redirect service unavailable');
                }

            } catch (error) {
                console.error('❌ Failed to open Typeform:', error);
                
                // Fallback to direct URL with UUID
                try {
                    const typeformUrl = UUIDService.buildTypeformUrl('https://form.typeform.com/to/b03aFxEO', {
                        product_id: 'car_crash_lawyer_ai',
                        source: 'signup_page_fallback'
                    });
                    window.open(typeformUrl, '_blank');
                    showError('Opened Typeform in fallback mode');
                } catch (fallbackError) {
                    window.open('https://form.typeform.com/to/b03aFxEO', '_blank');
                    showError('Opened basic Typeform (no UUID tracking)');
                }
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        // Check if already signed in
        const existingUserId = sessionStorage.getItem('userId');
        if (existingUserId) {
            // Already signed in, redirect to incident form
            window.location.href = '/incident.html';
        }
    </script>
</body>
</html>
