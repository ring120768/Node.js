
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report - Car Crash Lawyer AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2a5298;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #2a5298;
            outline: none;
        }
        button {
            background: #2a5298;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background: #1e3c72;
        }
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Incident Report</h1>
        <form id="incidentForm">
            <div class="form-group">
                <label for="driver_name">Full Name <span class="required">*</span></label>
                <input type="text" id="driver_name" name="driver_name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="incident_date">Date of Incident <span class="required">*</span></label>
                <input type="date" id="incident_date" name="incident_date" required>
            </div>
            
            <div class="form-group">
                <label for="incident_location">Incident Location <span class="required">*</span></label>
                <input type="text" id="incident_location" name="incident_location" required>
            </div>
            
            <div class="form-group">
                <label for="incident_description">What Happened? <span class="required">*</span></label>
                <textarea id="incident_description" name="incident_description" rows="4" required></textarea>
            </div>
            
            <button type="submit">Submit Incident Report</button>
        </form>
    </div>
    
    <script>
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Generate UUID for this submission
            const create_user_id = crypto.randomUUID();
            
            const formData = new FormData(e.target);
            const data = {
                create_user_id,
                form_response: {
                    form_id: 'direct_form',
                    token: `direct_${Date.now()}`,
                    submitted_at: new Date().toISOString(),
                    answers: []
                }
            };
            
            // Convert form data to Typeform-like structure
            for (let [key, value] of formData.entries()) {
                data.form_response.answers.push({
                    field: { ref: key, type: 'text' },
                    type: 'text',
                    text: value
                });
            }
            
            try {
                const response = await fetch('/webhook/incident-report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Api-Key': 'your-api-key-here' // You'll need to handle this
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    window.location.href = `/transcription-status.html?create_user_id=${create_user_id}`;
                } else {
                    alert('Error submitting form. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please check your connection.');
            }
        });
    </script>
</body>
</html>
