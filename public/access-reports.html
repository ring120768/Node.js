<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Your Reports - Car Crash Lawyer AI</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to bottom, #007acc, #00b4d8);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      background-color: rgba(255, 255, 255, 0.1);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: white;
    }

    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #d1ecf9;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      box-sizing: border-box;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: white;
      background-color: white;
    }

    .help-text {
      font-size: 0.85rem;
      color: #d1ecf9;
      margin-top: 0.5rem;
      font-style: italic;
    }

    .submit-button {
      background-color: white;
      color: #007acc;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      width: 100%;
    }

    .submit-button:hover {
      background-color: #e6f2fb;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .submit-button:disabled {
      background-color: #ccc;
      color: #999;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      margin-top: 2rem;
      display: block;
      color: #d1ecf9;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: white;
      text-decoration: underline;
    }

    .loading {
      display: none;
      margin-top: 1rem;
      font-size: 1rem;
      color: #d1ecf9;
    }

    .error {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background-color: rgba(220, 53, 69, 0.8);
      border-radius: 8px;
      font-size: 1rem;
    }

    .success {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background-color: rgba(40, 167, 69, 0.8);
      border-radius: 8px;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
        margin: 1rem;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Access Your Reports</h1>
    <p class="subtitle">Enter your User ID to download your accident report PDF</p>

    <form id="accessForm">
      <div class="form-group">
        <label for="userId">User ID</label>
        <input 
          type="text" 
          id="userId" 
          name="userId" 
          placeholder="Enter your UUID (e.g., 123e4567-e89b-12d3-a456-426614174000)"
          required
        >
        <div class="help-text">
          This is the unique ID you received when you signed up or reported an incident
        </div>
      </div>

      <button type="submit" class="submit-button" id="submitButton">
        Download Report
      </button>
    </form>

    <div class="loading" id="loading">
      <p>Retrieving your report...</p>
    </div>

    <div class="error" id="error">
      <p id="errorMessage">Error retrieving report. Please check your User ID and try again.</p>
    </div>

    <div class="success" id="success">
      <p id="successMessage">Your report is downloading...</p>
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <script>
    document.getElementById('accessForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const userId = document.getElementById('userId').value.trim();
      const submitButton = document.getElementById('submitButton');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const success = document.getElementById('success');

      // Reset states
      loading.style.display = 'none';
      error.style.display = 'none';
      success.style.display = 'none';

      // Validate UUID format
      const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
      if (!uuidPattern.test(userId)) {
        error.style.display = 'block';
        document.getElementById('errorMessage').textContent = 'Please enter a valid UUID format';
        return;
      }

      // Show loading state
      submitButton.disabled = true;
      loading.style.display = 'block';

      try {
        // Call the API endpoint to get the PDF
        const response = await fetch(`/api/reports/${userId}/pdf`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
          }
        });

        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('No report found for this User ID');
          } else if (response.status === 403) {
            throw new Error('Access denied. Please check your User ID');
          } else {
            throw new Error('Unable to retrieve report. Please try again later');
          }
        }

        // Get the PDF blob
        const blob = await response.blob();

        // Create download link
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `accident-report-${userId}.pdf`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        // Show success message
        loading.style.display = 'none';
        success.style.display = 'block';
        document.getElementById('successMessage').textContent = 'Your report is downloading...';

      } catch (err) {
        loading.style.display = 'none';
        error.style.display = 'block';
        document.getElementById('errorMessage').textContent = err.message;
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
