<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Crash Lawyer AI - Incident Report</title>
  <script>
    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const userId = params.get('user_id') || '';
      const productId = params.get('product_id') || '';
      const formUrl = `https://form.typeform.com/to/WvM2ejru?user_id=${userId}&product_id=${productId}`;
      document.getElementById('typeform').src = formUrl;
    }
  </script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #005D80, #00A5D1);
      color: white;
      text-align: center;
    }
    .hero {
      padding: 3rem 1rem 1rem;
    }
    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    iframe {
      width: 100%;
      height: 85vh;
      border: none;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Incident Report Form</h1>
    <p>Powered by Car Crash Lawyer AI</p>
  </div>
  <iframe id="typeform" allow="camera; microphone; autoplay; encrypted-media;"></iframe>
</body>
</html>
