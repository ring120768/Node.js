<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summary Preview - Car Crash Lawyer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }

        .preview-controls {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #667eea;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }

        .content-area {
            padding: 30px;
        }

        .summary-editor {
            width: 100%;
            min-height: 300px;
            padding: 20px;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .summary-editor:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .metadata-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .metadata-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .metadata-item:last-child {
            border-bottom: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 30px;
            background: #f8f9fa;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 140px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn-ghost {
            background: transparent;
            color: #6c757d;
            border: 2px solid #dee2e6;
        }

        .btn-ghost:hover {
            background: #f8f9fa;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .character-count {
            text-align: right;
            color: #6c757d;
            font-size: 14px;
            margin-top: 10px;
        }

        .edit-indicator {
            display: none;
            background: #ffeaa7;
            color: #fdcb6e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            align-items: center;
            gap: 10px;
        }

        .edit-indicator.active {
            display: flex;
        }

        .transcription-toggle {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .transcription-content {
            display: none;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .transcription-content.show {
            display: block;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 12px;
            }

            .header h1 {
                font-size: 20px;
            }

            .preview-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .summary-editor {
                font-size: 14px;
                min-height: 250px;
            }

            .metadata-item {
                flex-direction: column;
                gap: 5px;
            }
        }

        /* Loading State */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Success/Error Messages */
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        /* Navigation Arrows */
        .nav-arrows {
            position: fixed;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            z-index: 1000;
            pointer-events: none;
        }

        .nav-arrow {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .nav-arrow.back {
            left: 20px;
        }

        .nav-arrow.forward {
            right: 20px;
        }

        .nav-arrow span {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .nav-arrow {
                width: 40px;
                height: 40px;
            }

            .nav-arrow.back {
                left: 10px;
            }

            .nav-arrow.forward {
                right: 10px;
            }

            .nav-arrow span {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="nav-arrows">
        <div class="nav-arrow back" id="backArrow" onclick="goBack()"><span>&#9664;</span></div>
        <div class="nav-arrow forward" id="forwardArrow" onclick="goForward()"><span>&#9654;</span></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📝 AI Summary Preview</h1>
            <div class="status-badge">Review & Edit Before Saving</div>
        </div>

        <div class="preview-controls">
            <div class="toggle-container">
                <label for="previewToggle">Always preview summaries</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="previewToggle" checked>
                    <span class="toggle-slider"></span>
                </div>
            </div>
            <button class="btn btn-ghost" onclick="skipPreview()">
                Skip & Auto-Approve
            </button>
        </div>

        <div class="content-area">
            <div id="messageArea" class="message"></div>

            <div class="edit-indicator" id="editIndicator">
                ✏️ Summary has been modified
            </div>

            <div class="transcription-toggle" onclick="toggleTranscription()">
                <strong>📄 View Original Transcription</strong>
                <span style="float: right;">▼</span>
            </div>
            <div class="transcription-content" id="transcriptionContent"></div>

            <h3 style="margin-bottom: 15px;">AI-Generated Summary</h3>
            <textarea 
                id="summaryEditor" 
                class="summary-editor" 
                placeholder="Loading summary..."
                oninput="handleSummaryEdit()"
            ></textarea>
            <div class="character-count">
                <span id="charCount">0</span> characters
            </div>

            <div class="metadata-section">
                <div class="metadata-item">
                    <span><strong>Generated:</strong></span>
                    <span id="generatedTime">-</span>
                </div>
                <div class="metadata-item">
                    <span><strong>Audio File:</strong></span>
                    <span id="audioFile">-</span>
                </div>
                <div class="metadata-item">
                    <span><strong>Status:</strong></span>
                    <span id="currentStatus">Pending Review</span>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="resetSummary()">
                ↺ Reset to Original
            </button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveSummary()">
                ✓ Save Summary
            </button>
        </div>
    </div>

    <script>
        let queueId = null;
        let originalSummary = '';
        let currentSummary = '';
        let userId = null;

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', async () => {
            // Get queue ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            queueId = urlParams.get('queueId');
            userId = urlParams.get('userId') || localStorage.getItem('userId');

            if (!queueId) {
                showMessage('Error: No queue ID provided', 'error');
                return;
            }

            await loadPreview();
            loadPreviewPreference();
            updateNavigationArrows();
        });

        async function loadPreview() {
            showLoading(true);
            try {
                const response = await fetch(`/api/summary/preview/${queueId}?userId=${userId}`, {
                    headers: {
                        'x-user-id': userId
                    }
                });

                if (!response.ok) throw new Error('Failed to load preview');

                const data = await response.json();

                originalSummary = data.summary;
                currentSummary = data.summary;

                document.getElementById('summaryEditor').value = data.summary;
                document.getElementById('transcriptionContent').textContent = data.transcription || 'No transcription available';

                // Update metadata
                if (data.metadata) {
                    document.getElementById('generatedTime').textContent = 
                        new Date(data.metadata.created_at).toLocaleString();
                    document.getElementById('audioFile').textContent = 
                        data.metadata.audio_file_url ? 'Available' : 'Not available';
                }

                updateCharCount();
            } catch (error) {
                console.error('Error loading preview:', error);
                showMessage('Failed to load summary preview', 'error');
            } finally {
                showLoading(false);
            }
        }

        function handleSummaryEdit() {
            currentSummary = document.getElementById('summaryEditor').value;
            const isEdited = currentSummary !== originalSummary;

            document.getElementById('editIndicator').classList.toggle('active', isEdited);
            updateCharCount();
        }

        function updateCharCount() {
            const count = document.getElementById('summaryEditor').value.length;
            document.getElementById('charCount').textContent = count;
        }

        function toggleTranscription() {
            const content = document.getElementById('transcriptionContent');
            content.classList.toggle('show');
        }

        function resetSummary() {
            if (confirm('Reset to original AI-generated summary?')) {
                document.getElementById('summaryEditor').value = originalSummary;
                currentSummary = originalSummary;
                document.getElementById('editIndicator').classList.remove('active');
                updateCharCount();
                showMessage('Summary reset to original', 'success');
            }
        }

        async function saveSummary() {
            showLoading(true);
            try {
                const response = await fetch(`/api/summary/save/${queueId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-user-id': userId
                    },
                    body: JSON.stringify({
                        summary: currentSummary,
                        userId: userId
                    })
                });

                if (!response.ok) throw new Error('Failed to save summary');

                const result = await response.json();
                showMessage('Summary saved successfully!', 'success');

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = '/transcription.html';
                }, 2000);

            } catch (error) {
                console.error('Error saving summary:', error);
                showMessage('Failed to save summary', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function skipPreview() {
            if (confirm('Skip preview and auto-approve this summary?')) {
                showLoading(true);
                try {
                    const response = await fetch(`/api/summary/skip-preview/${queueId}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-user-id': userId
                        },
                        body: JSON.stringify({ userId })
                    });

                    if (!response.ok) throw new Error('Failed to skip preview');

                    showMessage('Summary auto-approved', 'success');
                    setTimeout(() => {
                        window.location.href = '/transcription.html';
                    }, 1500);

                } catch (error) {
                    console.error('Error skipping preview:', error);
                    showMessage('Failed to skip preview', 'error');
                } finally {
                    showLoading(false);
                }
            }
        }

        async function loadPreviewPreference() {
            const savedPref = localStorage.getItem('previewEnabled');
            if (savedPref !== null) {
                document.getElementById('previewToggle').checked = savedPref === 'true';
            }
        }

        document.getElementById('previewToggle').addEventListener('change', async (e) => {
            const enabled = e.target.checked;
            localStorage.setItem('previewEnabled', enabled);

            try {
                await fetch('/api/user/preview-preference', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-user-id': userId
                    },
                    body: JSON.stringify({ enabled, userId })
                });
            } catch (error) {
                console.error('Error updating preference:', error);
            }
        });

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
            document.getElementById('saveBtn').disabled = show;
        }

        function showMessage(text, type) {
            const messageArea = document.getElementById('messageArea');
            messageArea.textContent = text;
            messageArea.className = `message ${type}`;

            if (type === 'success') {
                setTimeout(() => {
                    messageArea.style.display = 'none';
                }, 5000);
            }
        }

        // Navigation Arrow Functions (Placeholder)
        function goBack() {
            // Logic to navigate to the previous page or item
            console.log("Going back...");
            // Example: window.history.back(); or redirect to a previous item
        }

        function goForward() {
            // Logic to navigate to the next page or item
            console.log("Going forward...");
            // Example: window.history.forward(); or redirect to a next item
        }

        function updateNavigationArrows() {
            // Logic to determine if back/forward arrows should be enabled/disabled
            // based on current page context or available items.
            // For now, they are always visible.
            // Example: Check if there's a previous/next queueId
        }
    </script>
</body>
</html>
