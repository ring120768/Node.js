
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typeform UUID Integration Test Console</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Monaco', 'Consolas', monospace; 
            background: #1a1a1a; 
            color: #00ff00; 
            padding: 20px; 
            line-height: 1.4;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00ffff; margin-bottom: 20px; text-align: center; }
        .test-section { 
            background: #2d2d2d; 
            border: 1px solid #444; 
            margin: 20px 0; 
            border-radius: 8px; 
            overflow: hidden;
        }
        .section-header { 
            background: #333; 
            padding: 10px 15px; 
            color: #ffff00; 
            font-weight: bold; 
            cursor: pointer;
            user-select: none;
        }
        .section-header:hover { background: #444; }
        .section-content { padding: 15px; display: none; }
        .section-content.active { display: block; }
        .test-button { 
            background: #0066cc; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            margin: 5px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: inherit;
        }
        .test-button:hover { background: #0080ff; }
        .test-button:disabled { background: #666; cursor: not-allowed; }
        .log-output { 
            background: #111; 
            border: 1px solid #333; 
            padding: 10px; 
            height: 200px; 
            overflow-y: auto; 
            margin: 10px 0; 
            white-space: pre-wrap;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .warning { color: #ffaa00; }
        .info { color: #00aaff; }
        .input-group { margin: 10px 0; }
        .input-group label { display: block; margin-bottom: 5px; color: #ccc; }
        .input-group input, .input-group textarea { 
            width: 100%; 
            padding: 8px; 
            background: #333; 
            border: 1px solid #555; 
            color: #fff; 
            border-radius: 4px;
            font-family: inherit;
        }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .result-card { 
            background: #333; 
            border: 1px solid #555; 
            padding: 10px; 
            border-radius: 4px;
        }
        .timestamp { color: #888; font-size: 0.9em; }
        .uuid { color: #ff6666; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Typeform UUID Integration Test Console</h1>
        
        <!-- Test 1: URL Generation -->
        <div class="test-section">
            <div class="section-header" onclick="toggleSection('url-generation')">
                🔗 Test 1: Typeform URL Generation
            </div>
            <div class="section-content" id="url-generation-content">
                <div class="input-group">
                    <label>Form Type:</label>
                    <select id="url-form-type" style="width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px;">
                        <option value="incident">Incident Report</option>
                        <option value="signup">User Signup</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>User ID (leave blank to generate new):</label>
                    <input type="text" id="url-user-id" placeholder="Leave blank for auto-generation">
                </div>
                <button class="test-button" onclick="testUrlGeneration()">Generate & Test URL</button>
                <div class="log-output" id="url-log"></div>
                <div id="url-results" class="results-grid"></div>
            </div>
        </div>

        <!-- Test 2: Webhook Processing -->
        <div class="test-section">
            <div class="section-header" onclick="toggleSection('webhook-processing')">
                📨 Test 2: Webhook UUID Extraction
            </div>
            <div class="section-content" id="webhook-processing-content">
                <div class="input-group">
                    <label>Extraction Method:</label>
                    <select id="webhook-method" style="width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px;">
                        <option value="hidden_fields">Hidden Fields</option>
                        <option value="variables">Variables</option>
                        <option value="answers">Form Answers</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Test User ID:</label>
                    <input type="text" id="webhook-user-id" placeholder="Leave blank for auto-generation">
                </div>
                <button class="test-button" onclick="testWebhookExtraction()">Test Webhook Processing</button>
                <button class="test-button" onclick="testAllWebhookMethods()">Test All Methods</button>
                <div class="log-output" id="webhook-log"></div>
                <div id="webhook-results" class="results-grid"></div>
            </div>
        </div>

        <!-- Test 3: Return Journey -->
        <div class="test-section">
            <div class="section-header" onclick="toggleSection('return-journey')">
                🔄 Test 3: Return Journey Flow
            </div>
            <div class="section-content" id="return-journey-content">
                <div class="input-group">
                    <label>Form Type:</label>
                    <select id="return-form-type" style="width: 100%; padding: 8px; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px;">
                        <option value="incident">Incident Report</option>
                        <option value="signup">User Signup</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Test User ID:</label>
                    <input type="text" id="return-user-id" placeholder="Leave blank for auto-generation">
                </div>
                <button class="test-button" onclick="testReturnJourney()">Test Return Flow</button>
                <button class="test-button" onclick="simulateTypeformReturn()">Simulate Actual Return</button>
                <div class="log-output" id="return-log"></div>
                <div id="return-results" class="results-grid"></div>
            </div>
        </div>

        <!-- Test 4: Database State -->
        <div class="test-section">
            <div class="section-header" onclick="toggleSection('database-state')">
                🗄️ Test 4: Database State Checking
            </div>
            <div class="section-content" id="database-state-content">
                <div class="input-group">
                    <label>Test User ID:</label>
                    <input type="text" id="db-user-id" placeholder="Leave blank for auto-generation">
                </div>
                <button class="test-button" onclick="testDatabaseState(false)">Check Database State</button>
                <button class="test-button" onclick="testDatabaseState(true)">Create Test Data & Check</button>
                <div class="log-output" id="db-log"></div>
                <div id="db-results" class="results-grid"></div>
            </div>
        </div>

        <!-- Test 5: Full Integration -->
        <div class="test-section">
            <div class="section-header" onclick="toggleSection('full-integration')">
                🚀 Test 5: Full Integration Test
            </div>
            <div class="section-content" id="full-integration-content">
                <p>This runs all tests in sequence with a single test UUID.</p>
                <button class="test-button" onclick="runFullIntegrationTest()">Run Full Integration Test</button>
                <div class="log-output" id="full-log"></div>
                <div id="full-results" class="results-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // UUID Generation
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Log functions
        function log(containerId, message, type = 'info') {
            const logContainer = document.getElementById(containerId);
            const timestamp = new Date().toISOString();
            const className = type;
            logContainer.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog(containerId) {
            document.getElementById(containerId).innerHTML = '';
        }

        // Section toggle
        function toggleSection(sectionName) {
            const content = document.getElementById(sectionName + '-content');
            content.classList.toggle('active');
        }

        // Test 1: URL Generation
        async function testUrlGeneration() {
            clearLog('url-log');
            log('url-log', '🔗 Starting URL generation test...', 'info');

            const formType = document.getElementById('url-form-type').value;
            const userId = document.getElementById('url-user-id').value || generateUUID();

            try {
                log('url-log', `Generating ${formType} URL for user: ${userId.substring(0, 8)}...`, 'info');

                const response = await fetch(`/api/test/typeform-url/${formType}?userId=${userId}`);
                const result = await response.json();

                if (result.success) {
                    log('url-log', '✅ URL generation successful!', 'success');
                    log('url-log', `Generated URL: ${result.generated_url}`, 'info');
                    log('url-log', `Parameters: ${JSON.stringify(result.extracted_parameters, null, 2)}`, 'info');
                    
                    // Display results
                    document.getElementById('url-results').innerHTML = `
                        <div class="result-card">
                            <h3>✅ URL Generation Results</h3>
                            <p><strong>Form Type:</strong> ${result.form_type}</p>
                            <p><strong>User ID:</strong> <span class="uuid">${result.user_id}</span></p>
                            <p><strong>Parameters Found:</strong> ${result.validation.param_count}</p>
                            <p><strong>Has User ID:</strong> ${result.validation.has_user_id ? '✅' : '❌'}</p>
                            <p><strong>Has Auth Code:</strong> ${result.validation.has_auth_code ? '✅' : '❌'}</p>
                            <p><strong>Has Product ID:</strong> ${result.validation.has_product_id ? '✅' : '❌'}</p>
                            <div style="margin-top: 10px;">
                                <button class="test-button" onclick="window.open('${result.generated_url}', '_blank')">
                                    🔗 Open Generated URL
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    log('url-log', `❌ URL generation failed: ${result.error}`, 'error');
                }
            } catch (error) {
                log('url-log', `❌ Test error: ${error.message}`, 'error');
            }
        }

        // Test 2: Webhook Processing
        async function testWebhookExtraction() {
            clearLog('webhook-log');
            log('webhook-log', '📨 Starting webhook extraction test...', 'info');

            const method = document.getElementById('webhook-method').value;
            const userId = document.getElementById('webhook-user-id').value || generateUUID();

            try {
                log('webhook-log', `Testing ${method} extraction for user: ${userId.substring(0, 8)}...`, 'info');

                // Generate test payload based on method
                let payload = {
                    event_id: `test_${Date.now()}`,
                    event_type: 'form_response',
                    form_response: {
                        form_id: 'WvM2ejru',
                        token: `test_token_${Date.now()}`,
                        landed_at: new Date().toISOString(),
                        submitted_at: new Date().toISOString(),
                        answers: [{
                            field: { id: 'test_field', ref: 'test_ref', type: 'short_text' },
                            type: 'text',
                            text: 'Test Answer'
                        }]
                    }
                };

                // Add UUID based on method
                switch (method) {
                    case 'hidden_fields':
                        payload.form_response.hidden = { user_id: userId, product_id: 'incident_report' };
                        break;
                    case 'variables':
                        payload.form_response.variables = [
                            { key: 'user_id', value: userId },
                            { key: 'product_id', value: 'incident_report' }
                        ];
                        break;
                    case 'answers':
                        payload.form_response.answers.push({
                            field: { id: 'user_id_field', ref: 'user_id', type: 'short_text' },
                            type: 'text',
                            text: userId
                        });
                        break;
                }

                const response = await fetch('/api/test/webhook-extraction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        payload: payload,
                        extraction_method: method
                    })
                });

                const result = await response.json();

                if (result.success) {
                    log('webhook-log', '✅ Webhook extraction test successful!', 'success');
                    log('webhook-log', `Extracted User ID: ${result.result.user_id}`, 'info');
                    log('webhook-log', `Method Used: ${result.result.method_used}`, 'info');

                    document.getElementById('webhook-results').innerHTML = `
                        <div class="result-card">
                            <h3>✅ Webhook Extraction Results</h3>
                            <p><strong>Method Tested:</strong> ${method}</p>
                            <p><strong>Extracted User ID:</strong> <span class="uuid">${result.result.user_id || 'None'}</span></p>
                            <p><strong>Method Used:</strong> ${result.result.method_used || 'None'}</p>
                            <p><strong>Auth Valid:</strong> ${result.result.auth_valid ? '✅' : '❌'}</p>
                            <p><strong>Success:</strong> ${result.result.success ? '✅' : '❌'}</p>
                        </div>
                    `;
                } else {
                    log('webhook-log', `❌ Webhook extraction failed: ${result.error}`, 'error');
                }
            } catch (error) {
                log('webhook-log', `❌ Test error: ${error.message}`, 'error');
            }
        }

        // Test all webhook methods
        async function testAllWebhookMethods() {
            const methods = ['hidden_fields', 'variables', 'answers'];
            for (const method of methods) {
                document.getElementById('webhook-method').value = method;
                await testWebhookExtraction();
                await new Promise(resolve => setTimeout(resolve, 1000)); // Brief delay
            }
        }

        // Test 3: Return Journey
        async function testReturnJourney() {
            clearLog('return-log');
            log('return-log', '🔄 Starting return journey test...', 'info');

            const formType = document.getElementById('return-form-type').value;
            const userId = document.getElementById('return-user-id').value || generateUUID();

            try {
                log('return-log', `Testing ${formType} return for user: ${userId.substring(0, 8)}...`, 'info');

                const response = await fetch(`/api/test/return-journey/${formType}?userId=${userId}`);
                const result = await response.json();

                if (result.success) {
                    log('return-log', '✅ Return journey test setup successful!', 'success');
                    log('return-log', `Return URL: ${result.return_url}`, 'info');
                    log('return-log', `Expected Redirect: ${result.expected_redirect}`, 'info');

                    document.getElementById('return-results').innerHTML = `
                        <div class="result-card">
                            <h3>✅ Return Journey Test</h3>
                            <p><strong>Form Type:</strong> ${result.form_type}</p>
                            <p><strong>User ID:</strong> <span class="uuid">${result.user_id}</span></p>
                            <p><strong>Expected Redirect:</strong> ${result.expected_redirect}</p>
                            <div style="margin-top: 10px;">
                                <button class="test-button" onclick="window.open('${result.return_url}', '_blank')">
                                    🔄 Test Return URL
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    log('return-log', `❌ Return journey test failed: ${result.error}`, 'error');
                }
            } catch (error) {
                log('return-log', `❌ Test error: ${error.message}`, 'error');
            }
        }

        // Simulate actual return from Typeform
        function simulateTypeformReturn() {
            const formType = document.getElementById('return-form-type').value;
            const userId = document.getElementById('return-user-id').value || generateUUID();
            
            const returnUrl = `/typeform-complete?user_id=${userId}&form_type=${formType}&test_mode=true`;
            log('return-log', `🔄 Simulating return from Typeform...`, 'info');
            log('return-log', `Opening: ${returnUrl}`, 'info');
            
            window.open(returnUrl, '_blank');
        }

        // Test 4: Database State
        async function testDatabaseState(createTestData) {
            clearLog('db-log');
            log('db-log', '🗄️ Starting database state test...', 'info');

            const userId = document.getElementById('db-user-id').value || generateUUID();

            try {
                log('db-log', `Checking database state for user: ${userId.substring(0, 8)}...`, 'info');

                const url = `/api/test/database-state/${userId}${createTestData ? '?create_test_data=true' : ''}`;
                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                    log('db-log', '✅ Database state check successful!', 'success');
                    log('db-log', `Total Records: ${result.results.summary.total_records}`, 'info');
                    log('db-log', `Tables with Data: ${result.results.summary.tables_with_data}/${result.results.summary.total_tables}`, 'info');

                    let tableResults = '';
                    Object.entries(result.results.tables).forEach(([table, data]) => {
                        const status = data.success && data.has_data ? '✅' : data.success ? '⚪' : '❌';
                        tableResults += `
                            <div style="margin: 5px 0; padding: 5px; background: #444; border-radius: 3px;">
                                ${status} <strong>${table}:</strong> ${data.record_count} records
                            </div>
                        `;
                    });

                    document.getElementById('db-results').innerHTML = `
                        <div class="result-card">
                            <h3>🗄️ Database State Results</h3>
                            <p><strong>User ID:</strong> <span class="uuid">${result.results.user_id}</span></p>
                            <p><strong>Total Records:</strong> ${result.results.summary.total_records}</p>
                            <p><strong>Tables with Data:</strong> ${result.results.summary.tables_with_data}/${result.results.summary.total_tables}</p>
                            <div style="margin-top: 10px;">
                                <h4>Table Breakdown:</h4>
                                ${tableResults}
                            </div>
                        </div>
                    `;
                } else if (result.skipped) {
                    log('db-log', '⚠️ Database test skipped - Supabase not configured', 'warning');
                } else {
                    log('db-log', `❌ Database test failed: ${result.error}`, 'error');
                }
            } catch (error) {
                log('db-log', `❌ Test error: ${error.message}`, 'error');
            }
        }

        // Test 5: Full Integration
        async function runFullIntegrationTest() {
            clearLog('full-log');
            log('full-log', '🚀 Starting full integration test...', 'info');

            try {
                const response = await fetch('/api/test/integration-full');
                const result = await response.json();

                if (result.overall_success) {
                    log('full-log', '✅ Full integration test PASSED!', 'success');
                } else {
                    log('full-log', '❌ Full integration test FAILED!', 'error');
                }

                log('full-log', `Tests Passed: ${result.summary.passed_tests}/${result.summary.total_tests}`, 'info');
                log('full-log', `Test User ID: ${result.user_id}`, 'info');

                let testResults = '';
                Object.entries(result.tests).forEach(([testName, testData]) => {
                    const status = testData.success ? '✅' : '❌';
                    testResults += `
                        <div style="margin: 5px 0; padding: 5px; background: #444; border-radius: 3px;">
                            ${status} <strong>${testName.replace('_', ' ').toUpperCase()}</strong>
                        </div>
                    `;
                });

                document.getElementById('full-results').innerHTML = `
                    <div class="result-card">
                        <h3>${result.overall_success ? '✅' : '❌'} Full Integration Test Results</h3>
                        <p><strong>Test User ID:</strong> <span class="uuid">${result.user_id}</span></p>
                        <p><strong>Tests Passed:</strong> ${result.summary.passed_tests}/${result.summary.total_tests}</p>
                        <p><strong>Duration:</strong> ${new Date(result.end_time) - new Date(result.start_time)}ms</p>
                        <div style="margin-top: 10px;">
                            <h4>Test Breakdown:</h4>
                            ${testResults}
                        </div>
                    </div>
                `;
            } catch (error) {
                log('full-log', `❌ Test error: ${error.message}`, 'error');
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            log('url-log', '🧪 Typeform UUID Integration Test Console Ready', 'success');
            log('webhook-log', '📨 Webhook test tools loaded', 'success');
            log('return-log', '🔄 Return journey test tools loaded', 'success');
            log('db-log', '🗄️ Database test tools loaded', 'success');
            log('full-log', '🚀 Full integration test ready', 'success');
        });
    </script>
</body>
</html>
