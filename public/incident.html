<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Emergency Incident Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-right: env(safe-area-inset-right);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);

            /* Modern Trendy Palette */
            --primary: #6366f1;  /* Indigo */
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --primary-bg: #eef2ff;

            --emergency: #fb7185;  /* Soft coral red */
            --emergency-dark: #f43f5e;
            --emergency-light: #fda4af;
            --emergency-bg: #ffe4e6;

            --success: #34d399;  /* Mint green */
            --success-dark: #10b981;
            --success-bg: #d1fae5;

            --warning: #fbbf24;  /* Warm yellow */
            --warning-dark: #f59e0b;
            --warning-bg: #fef3c7;

            --accent: #a78bfa;  /* Lavender */
            --accent-light: #c4b5fd;
            --accent-bg: #f3f4ff;

            --text: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;

            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;

            --border: #e2e8f0;
            --border-light: #f1f5f9;

            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 10px 10px -5px rgba(0,0,0,0.04);

            --radius: 16px;
            --radius-sm: 12px;
            --radius-lg: 20px;
            --min-touch: 44px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #f0f9ff 0%, #fef3f2 100%);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-top: var(--safe-top);
            padding-bottom: calc(80px + var(--safe-bottom));
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 16px 16px calc(16px + var(--safe-left));
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: var(--min-touch);
            height: var(--min-touch);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 20px;
            cursor: pointer;
            margin-left: -8px;
            transition: all 0.2s;
            color: var(--primary);
        }

        .back-btn:active {
            transform: scale(0.95);
            background: var(--primary-bg);
        }

        .header-title {
            flex: 1;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .connection-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 2px var(--success-bg);
        }

        .connection-status.offline {
            background: var(--warning);
            box-shadow: 0 0 0 2px var(--warning-bg);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        /* Main Content */
        .main-content {
            padding: 20px;
            padding-left: calc(20px + var(--safe-left));
            padding-right: calc(20px + var(--safe-right));
            max-width: 500px;
            margin: 0 auto;
        }

        /* Emergency Section */
        .emergency-section {
            background: linear-gradient(135deg, var(--emergency-bg) 0%, rgba(255,255,255,0.9) 100%);
            border: 2px solid var(--emergency-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
        }

        .emergency-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            color: var(--emergency-dark);
            font-weight: 600;
            font-size: 17px;
        }

        .emergency-grid {
            display: grid;
            gap: 12px;
        }

        .emergency-btn {
            min-height: 56px;
            padding: 16px;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            box-shadow: var(--shadow-sm);
        }

        .emergency-btn:active {
            transform: scale(0.98);
            box-shadow: none;
        }

        .emergency-btn.primary {
            background: #dc2626;
            color: white;
            border: 2px solid #dc2626;
            box-shadow: var(--shadow);
        }

        .emergency-btn.primary:active {
            background: #b91c1c;
        }

        .emergency-btn.recovery {
            background: #fbbf24;
            color: #1f2937;
            border: 2px solid #fbbf24;
            box-shadow: var(--shadow);
        }

        .emergency-btn.recovery:active {
            background: #f59e0b;
        }

        .emergency-btn.contact {
            background: #22c55e;
            color: white;
            border: 2px solid #22c55e;
            box-shadow: var(--shadow);
        }

        .emergency-btn.contact:active {
            background: #16a34a;
        }

        .emergency-btn .icon {
            font-size: 24px;
            width: 32px;
            text-align: center;
        }

        /* Sections */
        .section {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .section-static {
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .section-header-static {
            margin-bottom: 16px;
        }

        .section-header {
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            min-height: 64px;
            background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(248,250,252,1) 100%);
        }

        .section-header:active {
            background: var(--bg-tertiary);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .section-status {
            font-size: 14px;
            color: var(--text-light);
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 20px;
        }

        .section-status.success {
            color: var(--success-dark);
            background: var(--success-bg);
        }

        .chevron {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-lighter);
            font-size: 14px;
        }

        .section.expanded .chevron {
            transform: rotate(180deg);
        }

        .section-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section.expanded .section-content {
            max-height: 800px;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-inner {
            padding: 0 20px 20px;
            background: var(--bg-primary);
        }

        /* Location Button */
        .location-btn {
            width: 100%;
            min-height: 56px;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .location-btn:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-sm);
        }

        .location-btn:disabled {
            background: var(--text-lighter);
            opacity: 0.6;
        }

        .location-btn.locating {
            background: linear-gradient(135deg, var(--warning) 0%, var(--warning-dark) 100%);
        }

        .location-btn.success {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
        }

        /* Location Info */
        .location-info {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 16px;
        }

        .location-address {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            color: var(--text);
        }

        .location-coords {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 13px;
            color: var(--text-light);
        }

        .location-coords > div {
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .w3w-display {
            background: linear-gradient(135deg, var(--accent) 0%, var(--primary) 100%);
            color: white;
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
            font-weight: 600;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .accuracy-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: white;
            margin-bottom: 16px;
        }

        .accuracy-indicator.high {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
        }

        .accuracy-indicator.medium {
            background: linear-gradient(135deg, var(--warning) 0%, var(--warning-dark) 100%);
        }

        .accuracy-indicator.low {
            background: linear-gradient(135deg, var(--emergency) 0%, var(--emergency-dark) 100%);
        }

        /* Media Controls */
        .media-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .media-btn {
            min-height: 56px;
            padding: 16px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            background: var(--bg-secondary);
            border: 2px solid var(--border-light);
            color: var(--text);
            transition: all 0.2s;
        }

        .media-btn:active {
            transform: scale(0.98);
            background: var(--primary-bg);
            border-color: var(--primary-light);
        }

        .media-btn.recording {
            background: linear-gradient(135deg, var(--emergency) 0%, var(--emergency-dark) 100%);
            color: white;
            border: none;
            animation: recordPulse 1.5s ease-in-out infinite;
        }

        @keyframes recordPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(251, 113, 133, 0);
            }
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-light);
            padding: 12px;
            padding-bottom: calc(12px + var(--safe-bottom));
            padding-left: calc(16px + var(--safe-left));
            padding-right: calc(16px + var(--safe-right));
            z-index: 200;
            box-shadow: 0 -4px 6px -1px rgba(0,0,0,0.05);
        }

        .continue-btn {
            width: 100%;
            min-height: 48px;
            padding: 14px;
            background: linear-gradient(135deg, var(--success) 0%, var(--success-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .continue-btn:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-sm);
        }

        .continue-btn:disabled {
            background: var(--text-lighter);
            opacity: 0.6;
        }

        /* Map Container */
        #map {
            height: 200px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            margin-bottom: 16px;
            position: relative;
            border: 1px solid var(--border-light);
            overflow: hidden;
            z-index: 1;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            color: var(--text);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            animation: slideDown 0.3s ease;
            border: 1px solid var(--border-light);
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        /* Hidden Elements */
        .hidden {
            display: none !important;
        }

        /* Reduce motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <button class="back-btn" onclick="goBack()" aria-label="Go back">←</button>
        <h1 class="header-title">Emergency Report</h1>
        <div class="connection-status" id="connectionStatus" aria-label="Connection status"></div>
    </header>

    <main class="main-content">
        <!-- Emergency Section -->
        <section class="emergency-section">
            <div class="emergency-header">
                <span>🚨</span>
                <span>Emergency Services</span>
            </div>
            <div class="emergency-grid">
                <button class="emergency-btn primary" id="emergency999Btn" aria-label="Call 999">
                    <span class="icon">📞</span>
                    <span>999 - Emergency</span>
                </button>
                <button class="emergency-btn recovery" id="recoveryBtn" aria-label="Call recovery service">
                    <span class="icon">🚗</span>
                    <span>Recovery Service</span>
                </button>
                <button class="emergency-btn contact" id="emergencyContactBtn" aria-label="Call emergency contact">
                    <span class="icon">👤</span>
                    <span>Emergency Contact</span>
                </button>
            </div>
        </section>

        <!-- Location Section -->
        <section class="section expanded" id="locationSection">
            <div class="section-header" onclick="toggleSection('locationSection')">
                <div class="section-title">
                    <span>📍</span>
                    <span>Location</span>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span class="section-status" id="locationStatus">Not captured</span>
                    <span class="chevron">▼</span>
                </div>
            </div>
            <div class="section-content">
                <div class="section-inner">
                    <button class="location-btn" id="findMeBtn" aria-label="Find my location">
                        <span id="findMeBtnIcon">📍</span>
                        <span id="findMeBtnText">Find My Location</span>
                        <span class="spinner hidden" id="locationSpinner"></span>
                    </button>

                    <div class="location-info hidden" id="locationInfo">
                        <div class="accuracy-indicator" id="accuracyBadge">
                            <span>GPS Accuracy:</span>
                            <span id="accuracyValue">-</span>
                        </div>
                        <div class="location-address">
                            <strong style="color: var(--text); display: block; margin-bottom: 8px;">📍 Address</strong>
                            <span id="addressText" style="color: var(--text-light);">Locating...</span>
                        </div>
                        <div class="location-coords">
                            <div>
                                <div style="font-size: 11px; text-transform: uppercase; color: var(--text-lighter); margin-bottom: 4px;">Latitude</div>
                                <div id="latValue" style="font-weight: 600; color: var(--text);">-</div>
                            </div>
                            <div>
                                <div style="font-size: 11px; text-transform: uppercase; color: var(--text-lighter); margin-bottom: 4px;">Longitude</div>
                                <div id="lngValue" style="font-weight: 600; color: var(--text);">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="w3w-display hidden" id="what3wordsDisplay">
                        <div id="what3wordsText">///loading.words</div>
                    </div>

                    <div id="map" class="hidden"></div>
                </div>
            </div>
        </section>

        <!-- Documentation Section -->
        <section class="section-static">
            <div class="section-header-static">
                <div class="section-title">
                    <span>📱</span>
                    <span>Multimedia evidence</span>
                    <span class="section-status" id="documentStatus" style="margin-left: auto;">Optional</span>
                </div>
            </div>
            <div class="media-grid">
                <button class="media-btn" id="voiceBtn" aria-label="Record voice statement">
                    <span id="voiceBtnIcon">🎤</span>
                    <span id="voiceBtnText">AI Listening</span>
                </button>
                <button class="media-btn" id="dashcamBtn" aria-label="Add dashcam video">
                    <span>📹</span>
                    <span>Upload Dashcam</span>
                </button>
            </div>
            <input type="file" id="dashcamInput" accept="video/*" capture="environment" class="hidden">
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="continue-btn" id="continueBtn" aria-label="Continue to detailed report">
            Continue to Report →
        </button>
    </nav>

    <!-- Footer -->
    <footer style="text-align: center; padding: 20px; font-size: 14px; color: var(--text-light);">
        <a href="privacy-policy.html" style="color: var(--primary); text-decoration: none; margin-right: 15px;">Privacy Policy</a>
        <a href="terms-of-service.html" style="color: var(--primary); text-decoration: none;">Terms of Service</a>
    </footer>

    <script>
        // Global variables
        let userData = null;
        let emergencyContacts = null;
        let userLocation = null;
        let what3wordsData = null;
        let map = null;
        let marker = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let mapLoaded = false;

        // Removed privacy banner/popup JavaScript
        // Removed geolocation detection code
        // Removed automatic jurisdiction detection code

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Initializing emergency incident report...');
            setupConnectionMonitor();
            setupEmergencyButtons();
            setupLocationButton();
            setupMediaControls();
            setupContinueButton();
            await checkUserAuthentication();

            // Check if location was already captured
            const savedLocation = sessionStorage.getItem('userLocation');
            if (savedLocation) {
                userLocation = JSON.parse(savedLocation);
                displayLocation();
            }
        });

        // Connection monitoring
        function setupConnectionMonitor() {
            const indicator = document.getElementById('connectionStatus');

            function updateConnectionStatus() {
                if (!navigator.onLine) {
                    indicator.classList.add('offline');
                    showOfflineWarning();
                } else {
                    indicator.classList.remove('offline');
                }
            }

            window.addEventListener('online', updateConnectionStatus);
            window.addEventListener('offline', updateConnectionStatus);
            updateConnectionStatus();
        }

        function showOfflineWarning() {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = '📵 Offline - Data will sync when connected';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Toggle sections
        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.classList.toggle('expanded');

            // If this is the location section with a map, invalidate map size after expansion
            if (sectionId === 'locationSection' && map && section.classList.contains('expanded')) {
                setTimeout(() => {
                    map.invalidateSize();
                }, 350); // Wait for CSS transition to complete
            }

            // Haptic feedback if available
            if (navigator.vibrate) {
                navigator.vibrate(10);
            }
        }

        // Navigation
        function goBack() {
            if (navigator.vibrate) navigator.vibrate(10);
            window.location.href = '/';
        }

        // Location functionality
        function setupLocationButton() {
            const findMeBtn = document.getElementById('findMeBtn');

            findMeBtn.addEventListener('click', async function() {
                if (navigator.vibrate) navigator.vibrate(20);

                const btnText = document.getElementById('findMeBtnText');
                const btnIcon = document.getElementById('findMeBtnIcon');
                const spinner = document.getElementById('locationSpinner');

                if (!navigator.geolocation) {
                    alert('Geolocation not supported on this device');
                    return;
                }

                // Start locating
                this.classList.add('locating');
                this.disabled = true;
                btnText.textContent = 'Locating...';
                btnIcon.classList.add('hidden');
                spinner.classList.remove('hidden');

                try {
                    const position = await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => reject(new Error('Timeout')), 15000);

                        navigator.geolocation.getCurrentPosition(
                            (pos) => {
                                clearTimeout(timeout);
                                resolve(pos);
                            },
                            (err) => {
                                clearTimeout(timeout);
                                reject(err);
                            },
                            {
                                enableHighAccuracy: true,
                                timeout: 15000,
                                maximumAge: 0
                            }
                        );
                    });

                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    };

                    // Save to session
                    sessionStorage.setItem('userLocation', JSON.stringify(userLocation));

                    // Success feedback
                    this.classList.remove('locating');
                    this.classList.add('success');
                    btnText.textContent = 'Location Found!';
                    spinner.classList.add('hidden');
                    btnIcon.classList.remove('hidden');
                    btnIcon.textContent = '✓';

                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

                    displayLocation();

                    // Reset button after delay
                    setTimeout(() => {
                        this.classList.remove('success');
                        btnText.textContent = 'Update Location';
                        btnIcon.textContent = '📍';
                        this.disabled = false;
                    }, 2000);

                } catch (error) {
                    console.error('Location error:', error);
                    this.classList.remove('locating');
                    spinner.classList.add('hidden');
                    btnIcon.classList.remove('hidden');
                    btnIcon.textContent = '⚠️';
                    btnText.textContent = 'Location Failed - Retry';
                    this.disabled = false;

                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            });
        }

        // Display location information
        function displayLocation() {
            document.getElementById('locationInfo').classList.remove('hidden');
            document.getElementById('what3wordsDisplay').classList.remove('hidden');

            // Update coords
            document.getElementById('latValue').textContent = userLocation.lat.toFixed(6);
            document.getElementById('lngValue').textContent = userLocation.lng.toFixed(6);

            // Update accuracy
            const accuracyBadge = document.getElementById('accuracyBadge');
            const accuracyValue = document.getElementById('accuracyValue');
            accuracyValue.textContent = `±${Math.round(userLocation.accuracy)}m`;

            accuracyBadge.className = 'accuracy-indicator';
            if (userLocation.accuracy <= 30) {
                accuracyBadge.classList.add('high');
            } else if (userLocation.accuracy <= 100) {
                accuracyBadge.classList.add('medium');
            } else {
                accuracyBadge.classList.add('low');
            }

            // Update status
            document.getElementById('locationStatus').textContent = 'Captured';
            document.getElementById('locationStatus').classList.add('success');

            // Fetch address
            fetchAddress();

            // Fetch What3Words
            fetchWhat3Words();

            // Lazy load map only when needed
            loadMapIfNeeded();
        }

        // Lazy load map
        function loadMapIfNeeded() {
            if (!mapLoaded) {
                mapLoaded = true;
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                script.onload = () => {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                    document.head.appendChild(link);

                    setTimeout(() => {
                        if(userLocation) initializeMap();
                    }, 100);
                };
                document.head.appendChild(script);
            } else if (userLocation) {
                initializeMap();
            }
        }

        // Initialize map
        function initializeMap() {
            document.getElementById('map').classList.remove('hidden');

            if (!map) {
                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false
                }).setView([userLocation.lat, userLocation.lng], 16);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            } else {
                map.setView([userLocation.lat, userLocation.lng], 16);
            }

            if (marker) marker.remove();
            marker = L.marker([userLocation.lat, userLocation.lng]).addTo(map);
        }

        // Fetch address
        async function fetchAddress() {
            if (!navigator.onLine) return;

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLocation.lat}&lon=${userLocation.lng}&zoom=18&addressdetails=1`
                );
                const data = await response.json();
                document.getElementById('addressText').textContent = data.display_name || 'Address not found';
            } catch (error) {
                console.error('Geocoding error:', error);
                document.getElementById('addressText').textContent = `${userLocation.lat.toFixed(6)}, ${userLocation.lng.toFixed(6)}`;
            }
        }

        // Fetch What3Words
        async function fetchWhat3Words() {
            if (!navigator.onLine) return;

            try {
                const response = await fetch(`/api/what3words?lat=${userLocation.lat}&lng=${userLocation.lng}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.words) {
                        what3wordsData = data.words;
                        document.getElementById('what3wordsText').textContent = `///${data.words}`;
                    }
                }
            } catch (error) {
                console.error('What3Words error:', error);
                document.getElementById('what3wordsText').textContent = '///unavailable';
            }
        }

        // Media controls
        function setupMediaControls() {
            // Dashcam
            document.getElementById('dashcamBtn').addEventListener('click', () => {
                if (navigator.vibrate) navigator.vibrate(10);
                document.getElementById('dashcamInput').click();
            });

            document.getElementById('dashcamInput').addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (file) {
                    handleDashcamFile(file);
                    document.getElementById('documentStatus').textContent = 'Video added';
                    document.getElementById('documentStatus').classList.add('success');
                }
            });

            // Voice recording
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.addEventListener('click', async function() {
                if (navigator.vibrate) navigator.vibrate(20);

                const btnText = document.getElementById('voiceBtnText');
                const btnIcon = document.getElementById('voiceBtnIcon');

                if (!isRecording) {
                    // Check if page is served over HTTPS (required for microphone access)
                    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                        alert('Voice recording requires a secure connection (HTTPS). Please access this page via HTTPS.');
                        return;
                    }

                    // Check for getUserMedia support
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        alert('Voice recording is not supported on this device/browser. Please ensure you are using a modern browser with HTTPS.');
                        return;
                    }

                    try {
                        console.log('🎤 Requesting microphone access...');

                        // Request microphone permission with optimized constraints
                        const constraints = {
                            audio: {
                                echoCancellation: true,
                                noiseSuppression: true,
                                autoGainControl: true,
                                sampleRate: { ideal: 44100 },
                                channelCount: { ideal: 1 }
                            }
                        };

                        const stream = await navigator.mediaDevices.getUserMedia(constraints);
                        console.log('✅ Microphone access granted');

                        // Check for MediaRecorder support
                        if (!window.MediaRecorder) {
                            alert('Voice recording is not supported on this browser. Please use Chrome, Firefox, or Safari.');
                            stream.getTracks().forEach(track => track.stop());
                            return;
                        }

                        // Determine supported MIME type with better fallbacks
                        let mimeType = '';
                        const mimeTypes = [
                            'audio/webm;codecs=opus',
                            'audio/webm',
                            'audio/ogg;codecs=opus',
                            'audio/mp4',
                            'audio/mpeg'
                        ];

                        for (const type of mimeTypes) {
                            if (MediaRecorder.isTypeSupported(type)) {
                                mimeType = type;
                                break;
                            }
                        }

                        console.log('🎵 Using MIME type:', mimeType || 'browser default');

                        const options = mimeType ? { 
                            mimeType,
                            audioBitsPerSecond: 128000
                        } : {};

                        mediaRecorder = new MediaRecorder(stream, options);
                        audioChunks = [];

                        mediaRecorder.ondataavailable = (event) => {
                            if (event.data.size > 0) {
                                audioChunks.push(event.data);
                                console.log('📊 Audio chunk received:', event.data.size, 'bytes');
                            }
                        };

                        mediaRecorder.onstop = async () => {
                            console.log('⏹️ Recording stopped, processing audio...');
                            try {
                                const audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
                                console.log('📦 Audio blob created:', audioBlob.size, 'bytes');

                                if (audioBlob.size === 0) {
                                    throw new Error('Recording is empty - no audio data captured');
                                }

                                await storeAudio(audioBlob);

                                document.getElementById('documentStatus').textContent = 'Statement recorded';
                                document.getElementById('documentStatus').classList.add('success');

                                console.log('✅ Audio stored successfully');
                            } catch (storeError) {
                                console.error('❌ Error storing audio:', storeError);
                                alert('Failed to save recording: ' + storeError.message);
                            } finally {
                                stream.getTracks().forEach(track => track.stop());
                            }
                        };

                        mediaRecorder.onerror = (event) => {
                            console.error('❌ MediaRecorder error:', event.error);
                            alert('Recording error occurred: ' + (event.error?.message || 'Unknown error'));
                            stream.getTracks().forEach(track => track.stop());
                            isRecording = false;
                            this.classList.remove('recording');
                            btnText.textContent = 'Record Statement';
                            btnIcon.textContent = '🎤';
                        };

                        // Start recording with data collection interval
                        mediaRecorder.start(1000); // Capture in 1-second chunks
                        isRecording = true;
                        this.classList.add('recording');
                        btnText.textContent = 'Stop Recording';
                        btnIcon.textContent = '⏹';

                        console.log('🎤 Recording started successfully');

                        // Auto-stop after 5 minutes for safety
                        setTimeout(() => {
                            if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                                console.log('⏰ Auto-stopping recording after 5 minutes');
                                mediaRecorder.stop();
                                isRecording = false;
                                this.classList.remove('recording');
                                btnText.textContent = 'Record Statement';
                                btnIcon.textContent = '🎤';
                                alert('Recording automatically stopped after 5 minutes.');
                            }
                        }, 300000); // 5 minutes

                    } catch (error) {
                        console.error('❌ Microphone access error:', error);

                        // Provide specific error messages with solutions
                        let errorMessage = 'Unable to access microphone.\n\n';

                        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                            errorMessage += 'Permission denied. Please:\n• Click the microphone icon in your browser address bar\n• Allow microphone access\n• Refresh the page and try again';
                        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
                            errorMessage += 'No microphone found. Please:\n• Connect a microphone or headset\n• Check your device settings\n• Ensure your microphone is not disabled';
                        } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
                            errorMessage += 'Microphone is busy. Please:\n• Close other applications using the microphone\n• Restart your browser\n• Try again';
                        } else if (error.name === 'OverconstrainedError' || error.name === 'ConstraintNotSatisfiedError') {
                            errorMessage += 'Microphone compatibility issue. Please:\n• Try a different microphone\n• Update your browser\n• Check microphone drivers';
                        } else if (error.name === 'NotSupportedError') {
                            errorMessage += 'Recording not supported. Please:\n• Use HTTPS connection\n• Update your browser\n• Try Chrome, Firefox, or Safari';
                        } else {
                            errorMessage += 'Error: ' + (error.message || 'Unknown error occurred') + '\n\nPlease:\n• Refresh the page\n• Check browser permissions\n• Try a different browser';
                        }

                        alert(errorMessage);

                        // Reset button state
                        isRecording = false;
                        this.classList.remove('recording');
                        btnText.textContent = 'Record Statement';
                        btnIcon.textContent = '🎤';
                    }
                } else {
                    // Stop recording
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        console.log('🛑 Manually stopping recording...');
                    }
                    isRecording = false;
                    this.classList.remove('recording');
                    btnText.textContent = 'Record Statement';
                    btnIcon.textContent = '🎤';
                }
            });
        }

        // Handle dashcam file
        async function handleDashcamFile(file) {
            const formData = new FormData();
            formData.append('video', file);
            formData.append('userId', userData?.uid || 'anonymous');
            formData.append('incidentId', sessionStorage.getItem('currentIncidentId') || Date.now().toString());

            // Store locally if offline
            if (!navigator.onLine) {
                await storeOfflineData('dashcam', file);
                return;
            }

            try {
                await fetch('/api/store-evidence-video', {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.error('Upload error:', error);
                await storeOfflineData('dashcam', file);
            }
        }

        // Store audio
        async function storeAudio(audioBlob) {
            const formData = new FormData();
            formData.append('audio', audioBlob, 'recording.webm');
            formData.append('userId', userData?.uid || 'anonymous');

            if (!navigator.onLine) {
                await storeOfflineData('audio', audioBlob);
                return;
            }

            try {
                await fetch('/api/store-evidence-audio', {
                    method: 'POST',
                    body: formData
                });
            } catch (error) {
                console.error('Audio storage error:', error);
                await storeOfflineData('audio', audioBlob);
            }
        }

        // Store offline data
        async function storeOfflineData(type, data) {
            // In production, implement IndexedDB storage
            console.log('Storing offline data:', type);
            sessionStorage.setItem(`offline_${type}_${Date.now()}`, 'pending');
        }

        // Emergency buttons
        function setupEmergencyButtons() {
            document.getElementById('emergency999Btn').onclick = function() {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                if (confirm('Call 999 Emergency Services?')) {
                    window.location.href = 'tel:999';
                }
            };

            document.getElementById('recoveryBtn').onclick = function() {
                if (navigator.vibrate) navigator.vibrate(20);
                if (emergencyContacts?.recovery_breakdown_number) {
                    if (confirm(`Call recovery: ${emergencyContacts.recovery_breakdown_number}?`)) {
                        window.location.href = `tel:${emergencyContacts.recovery_breakdown_number}`;
                    }
                } else {
                    alert('No recovery number saved');
                }
            };

            document.getElementById('emergencyContactBtn').onclick = function() {
                if (navigator.vibrate) navigator.vibrate(20);
                if (emergencyContacts?.emergency_contact) {
                    if (confirm(`Call: ${emergencyContacts.emergency_contact}?`)) {
                        window.location.href = `tel:${emergencyContacts.emergency_contact}`;
                    }
                } else {
                    alert('No emergency contact saved');
                }
            };
        }

        // Continue button
        function setupContinueButton() {
            document.getElementById('continueBtn').addEventListener('click', async function() {
                if (navigator.vibrate) navigator.vibrate(20);

                this.disabled = true;
                this.textContent = 'Processing...';

                const incidentData = {
                    userId: userData?.uid || null,
                    location: userLocation,
                    what3words: what3wordsData,
                    timestamp: new Date().toISOString(),
                    address: document.getElementById('addressText').textContent
                };

                sessionStorage.setItem('incidentData', JSON.stringify(incidentData));
                window.location.href = 'safety-check.html';
            });
        }

        // Check authentication
        async function checkUserAuthentication() {
            try {
                const response = await fetch('/api/auth/status');
                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated && data.user) {
                        userData = data.user;

                        const contactsResponse = await fetch(`/api/user/${userData.uid}/emergency-contacts`);
                        if (contactsResponse.ok) {
                            emergencyContacts = await contactsResponse.json();
                        }
                    }
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }
    </script>
